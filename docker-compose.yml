services:
  browser:
    image: ghcr.io/browserless/chromium
    container_name: clawbot-browser
    ports:
      - "3000:3000"
    environment:
      TOKEN: "${BROWSER_TOKEN:-clawbot-dev}"
      ENABLE_DEBUGGER: "true"
      DEFAULT_LAUNCH_ARGS: '["--disable-dev-shm-usage","--disable-gpu","--no-sandbox"]'
      PREBOOT_CHROME: "true"
      MAX_CONCURRENT_SESSIONS: "5"
      CONNECTION_TIMEOUT: "600000"
    volumes:
      - browser-data:/data
      - browser-profiles:/data/browser-profiles
    shm_size: "2g"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/json/version?token=${BROWSER_TOKEN:-clawbot-dev}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"

  searxng:
    image: searxng/searxng:latest
    container_name: clawbot-searxng
    ports:
      - "127.0.0.1:8888:8080"
    volumes:
      - ./docker/searxng/settings.yml:/etc/searxng/settings.yml:ro
      - searxng-data:/etc/searxng
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  gateway:
    build:
      context: .
      dockerfile: server/gateway/Dockerfile
    container_name: clawbot-gateway
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    environment:
      GATEWAY_PORT: "8080"
    volumes:
      - gateway-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:8080/health', r => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  agent:
    build:
      context: .
      dockerfile: server/agent/Dockerfile
    container_name: clawbot-agent
    depends_on:
      browser:
        condition: service_healthy
      gateway:
        condition: service_healthy
      searxng:
        condition: service_healthy
    volumes:
      - browser-profiles:/data/browser-profiles
      - workspace:/workspace
    environment:
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      BROWSER_CDP_URL: "ws://browser:3000?token=${BROWSER_TOKEN:-clawbot-dev}"
      CLAWBOT_GATEWAY_URL: "ws://gateway:8080"
      BROWSER_PROFILES_DIR: "/data/browser-profiles"
      CLAWBOT_SEARXNG_URL: "http://searxng:8080"
      CLAWBOT_WORKSPACE: "/workspace"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import os; os.kill(1, 0)'"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

volumes:
  browser-data:
  browser-profiles:
  searxng-data:
  workspace:
  gateway-data:
